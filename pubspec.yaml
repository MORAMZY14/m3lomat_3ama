name: ma3lomat_flutter
description: Flutter mobile conversion of the Ma3lomat 3ama team quiz game.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.5+1
  http: ^1.5.0
  cached_network_image: ^3.4.1
  just_audio: ^0.10.6
  qr_flutter: ^4.1.0
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.15.2
  cloud_firestore: ^5.2.1
  firebase_auth: ^5.1.3
  cloud_functions: ^5.0.4
  firebase_storage: ^12.1.2
  firebase_app_check: ^0.3.0+4
  firebase_messaging: ^15.0.4
  firebase_database: ^11.3.10



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
