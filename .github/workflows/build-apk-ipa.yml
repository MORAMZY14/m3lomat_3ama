name: Build APK & IPA

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ------------------------------------------------
  # 1. Increment pubspec version, commit, and tag
  # ------------------------------------------------
  update-version:
    name: 🔢 Auto-increment version
    runs-on: ubuntu-latest

    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_build: ${{ steps.bump.outputs.new_build }}
      new_tag: ${{ steps.bump.outputs.new_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read and increment pubspec version
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="$(grep -E '^version:' pubspec.yaml | head -n 1 | sed -E 's/^version:[[:space:]]*//')"

          if [[ ! "$CURRENT_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)\+([0-9]+)$ ]]; then
            echo "Invalid pubspec version: $CURRENT_VERSION"
            echo "Expected format: version: 1.0.0+1"
            exit 1
          fi

          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          BUILD="${BASH_REMATCH[4]}"

          NEW_PATCH=$((PATCH + 1))
          NEW_BUILD=$((BUILD + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists."
            exit 1
          fi

          sed -i -E "s/^version:.*/version: ${NEW_VERSION}+${NEW_BUILD}/" pubspec.yaml

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_build=$NEW_BUILD" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

          echo "Old version: $CURRENT_VERSION"
          echo "New version: ${NEW_VERSION}+${NEW_BUILD}"
          echo "New tag: $NEW_TAG"

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}+${{ steps.bump.outputs.new_build }}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail

          git tag "${{ steps.bump.outputs.new_tag }}"
          git push origin "${{ steps.bump.outputs.new_tag }}"

  # ------------------------------------------------
  # 2. Build Android APK
  # ------------------------------------------------
  build-apk:
    name: 🤖 Android APK
    runs-on: ubuntu-latest
    needs: update-version

    steps:
      - name: Checkout new tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-version.outputs.new_tag }}
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter information
        run: flutter doctor -v

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk \
            --release \
            --build-name="${{ needs.update-version.outputs.new_version }}" \
            --build-number="${{ needs.update-version.outputs.new_build }}"

      - name: Rename APK
        shell: bash
        run: |
          set -euo pipefail

          mv \
            build/app/outputs/flutter-apk/app-release.apk \
            "build/app/outputs/flutter-apk/Ma3lomat-${{ needs.update-version.outputs.new_version }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ma3lomat-Android-${{ needs.update-version.outputs.new_version }}
          path: build/app/outputs/flutter-apk/Ma3lomat-${{ needs.update-version.outputs.new_version }}.apk
          if-no-files-found: error
          retention-days: 14

  # ------------------------------------------------
  # 3. Build unsigned iOS IPA using CocoaPods
  # ------------------------------------------------
  build-ios:
    name: 🍎 iOS IPA
    runs-on: macos-latest
    needs: update-version

    steps:
      - name: Checkout new tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-version.outputs.new_tag }}
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Show Flutter information
        run: flutter doctor -v

      - name: Generate iOS project if missing
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "ios/Runner.xcodeproj/project.pbxproj" ] || [ ! -s "ios/Podfile" ]; then
            flutter create --platforms=ios .
          fi

          test -f ios/Runner.xcodeproj/project.pbxproj
          test -s ios/Podfile

      - name: Validate Podfile
        shell: bash
        run: |
          set -euo pipefail

          if grep -q "use_modular_headers!" ios/Podfile; then
            echo "Remove use_modular_headers! from ios/Podfile."
            exit 1
          fi

          if grep -E -q "Firebase(Core|Auth|Firestore|Storage|Functions|SharedSwift).*10\.22\.0|FirebaseSDKVersion.*10\.22\.0" ios/Podfile; then
            echo "Remove manually pinned Firebase 10.22.0 pods from ios/Podfile."
            exit 1
          fi

          if ! grep -E -q "use_frameworks![[:space:]]*:linkage[[:space:]]*=>[[:space:]]*:dynamic" ios/Podfile; then
            echo "ios/Podfile must contain: use_frameworks! :linkage => :dynamic"
            exit 1
          fi

      - name: Completely clean iOS dependencies
        shell: bash
        run: |
          set -euo pipefail

          flutter clean

          rm -rf build/ios
          rm -rf ios/Pods
          rm -rf ios/.symlinks
          rm -rf ios/Flutter/ephemeral
          rm -f ios/Podfile.lock
          rm -f ios/Flutter/Generated.xcconfig
          rm -f ios/Flutter/flutter_export_environment.sh

          rm -rf "$HOME/Library/Developer/Xcode/DerivedData"
          rm -rf "$HOME/Library/Caches/CocoaPods"

      - name: Install Flutter dependencies
        shell: bash
        run: |
          set -euo pipefail

          flutter pub get
          flutter precache --ios

      - name: Restore standard Flutter xcconfig files
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ios/Flutter

          cat > ios/Flutter/Debug.xcconfig <<'EOF'
          #include? "Pods/Target Support Files/Pods-Runner/Pods-Runner.debug.xcconfig"
          #include "Generated.xcconfig"
          EOF

          cat > ios/Flutter/Release.xcconfig <<'EOF'
          #include? "Pods/Target Support Files/Pods-Runner/Pods-Runner.release.xcconfig"
          #include "Generated.xcconfig"
          EOF

          cat > ios/Flutter/Profile.xcconfig <<'EOF'
          #include? "Pods/Target Support Files/Pods-Runner/Pods-Runner.profile.xcconfig"
          #include "Generated.xcconfig"
          EOF

      - name: Reinstall CocoaPods dependencies
        shell: bash
        run: |
          set -euo pipefail

          cd ios

          pod deintegrate || true
          pod cache clean --all || true
          rm -rf Pods
          rm -f Podfile.lock

          pod install --repo-update --clean-install

      - name: Verify CocoaPods integration
        shell: bash
        run: |
          set -euo pipefail

          test -d ios/Pods
          test -f ios/Runner.xcworkspace/contents.xcworkspacedata
          test -d "ios/Pods/Target Support Files/Pods-Runner"

          if grep -R -n -F 'E:\flutter' ios 2>/dev/null; then
            echo "A stale Windows Flutter path still exists in the iOS project."
            exit 1
          fi

          echo "Pods-Runner support files:"
          find "ios/Pods/Target Support Files/Pods-Runner" \
            -maxdepth 1 \
            -type f \
            -print

      - name: Build unsigned iOS application
        shell: bash
        run: |
          set -euo pipefail

          flutter build ios \
            --release \
            --no-codesign \
            --build-name="${{ needs.update-version.outputs.new_version }}" \
            --build-number="${{ needs.update-version.outputs.new_build }}"

      - name: Create unsigned IPA
        shell: bash
        run: |
          set -euo pipefail

          cd build/ios/iphoneos

          test -d Runner.app
          rm -rf Payload
          mkdir -p Payload
          cp -R Runner.app Payload/Runner.app

          ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            Payload \
            "Ma3lomat-${{ needs.update-version.outputs.new_version }}-unsigned.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ma3lomat-iOS-${{ needs.update-version.outputs.new_version }}
          path: build/ios/iphoneos/Ma3lomat-${{ needs.update-version.outputs.new_version }}-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

  # ------------------------------------------------
  # 4. Create one GitHub Release with APK and IPA
  # ------------------------------------------------
  create-release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - update-version
      - build-apk
      - build-ios

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Show release files
        run: find release-files -maxdepth 2 -type f -print

      - name: Create release and upload files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.update-version.outputs.new_tag }}
          name: Ma3lomat ${{ needs.update-version.outputs.new_version }}
          body: |
            Ma3lomat version ${{ needs.update-version.outputs.new_version }}

            Build number: ${{ needs.update-version.outputs.new_build }}

            Included files:
            - Android APK
            - Unsigned iOS IPA

            The IPA is unsigned. Apple code signing is required for normal
            installation, TestFlight, or App Store distribution.
          files: |
            release-files/*.apk
            release-files/*.ipa
          fail_on_unmatched_files: true
